name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # .github/ 을 소유자 외의 주체(에이전트 포함)가 수정하면 실패
  protected-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check protected paths
        if: github.actor != github.repository_owner
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "$CHANGED"
          if echo "$CHANGED" | grep -E '^\.github/' ; then
            echo "::error::보호 경로(.github/)는 소유자만 수정할 수 있습니다."
            exit 1
          fi

  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Qt system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb libegl1 libgl1 libxkbcommon-x11-0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-cursor0 libdbus-1-3

      - name: Sync dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: xvfb-run -a uv run pytest --maxfail=5 -q
