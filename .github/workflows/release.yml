name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: CVDv2-${{ github.ref_name }}-windows.exe
          - os: macos-latest
            artifact: CVDv2-${{ github.ref_name }}-macos-arm64
          - os: ubuntu-22.04
            artifact: CVDv2-${{ github.ref_name }}-linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Verify version matches tag
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PY_VERSION=$(uv run python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG_VERSION pyproject=$PY_VERSION"
          if [ "$TAG_VERSION" != "$PY_VERSION" ]; then
            echo "::error::태그 버전($TAG_VERSION)과 pyproject.toml 버전($PY_VERSION)이 다릅니다."
            exit 1
          fi

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y patchelf

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: >
          uv run python -m nuitka
          --onefile
          --assume-yes-for-downloads
          --enable-plugin=pyside6
          --windows-console-mode=disable
          --include-data-dir=resources=resources
          --include-data-dir=translations=translations
          --output-filename=${{ matrix.artifact }}
          --output-dir=build
          main.py

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: >
          uv run python -m nuitka
          --onefile
          --assume-yes-for-downloads
          --enable-plugin=pyside6
          --macos-create-app-bundle
          --include-data-dir=resources=resources
          --include-data-dir=translations=translations
          --output-filename=${{ matrix.artifact }}
          --output-dir=build
          main.py

      - name: Package app bundle (macOS)
        if: runner.os == 'macOS'
        run: cd build && zip -r "${{ matrix.artifact }}.zip" .

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: >
          uv run python -m nuitka
          --onefile
          --assume-yes-for-downloads
          --enable-plugin=pyside6
          --include-data-dir=resources=resources
          --include-data-dir=translations=translations
          --output-filename=${{ matrix.artifact }}
          --output-dir=build
          main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            build/${{ matrix.artifact }}
            build/${{ matrix.artifact }}.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
