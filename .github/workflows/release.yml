name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: CVDv2-${{ github.ref_name }}-windows.exe
          - os: macos-latest
            artifact: CVDv2-${{ github.ref_name }}-macos-arm64
          - os: ubuntu-22.04
            artifact: CVDv2-${{ github.ref_name }}-linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Verify version matches tag
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PY_VERSION=$(uv run python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG_VERSION pyproject=$PY_VERSION"
          if [ "$TAG_VERSION" != "$PY_VERSION" ]; then
            echo "::error::태그 버전($TAG_VERSION)과 pyproject.toml 버전($PY_VERSION)이 다릅니다."
            exit 1
          fi

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y patchelf

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION_NUM="${GITHUB_REF_NAME#v}"
          VERSION_NUM="${VERSION_NUM%%-*}"
          uv run python -m nuitka \
            --onefile \
            --assume-yes-for-downloads \
            --enable-plugin=pyside6 \
            --windows-console-mode=disable \
            --windows-icon-from-ico=resources/chzzk.ico \
            --company-name=honey720 \
            --product-name="Chzzk VOD Downloader" \
            --file-description="Chzzk VOD Downloader v2" \
            --file-version="$VERSION_NUM" \
            --product-version="$VERSION_NUM" \
            --copyright="honey720" \
            --include-data-dir=resources=resources \
            --include-data-dir=translations=translations \
            --output-filename="${{ matrix.artifact }}" \
            --output-dir=build \
            main.py

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: >
          uv run python -m nuitka
          --standalone
          --assume-yes-for-downloads
          --enable-plugin=pyside6
          --macos-create-app-bundle
          --macos-app-name=CVDv2
          --include-data-dir=resources=resources
          --include-data-dir=translations=translations
          --output-dir=build
          main.py

      - name: Package app bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build
          ls -la
          mv main.app CVDv2.app
          zip -r "${{ matrix.artifact }}.zip" CVDv2.app

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: >
          uv run python -m nuitka
          --onefile
          --assume-yes-for-downloads
          --enable-plugin=pyside6
          --include-data-dir=resources=resources
          --include-data-dir=translations=translations
          --output-filename=${{ matrix.artifact }}
          --output-dir=build
          main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            build/${{ matrix.artifact }}
            build/${{ matrix.artifact }}.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # 릴리즈 생성 전에 스캔 → 링크를 본문에 직접 주입 (태그 이벤트에서도 확실히 동작)
      - name: VirusTotal scan
        id: vt
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: dist/*

      - name: Format VT links
        id: vtmd
        run: |
          {
            echo 'body<<VTEOF'
            echo '### 🛡 VirusTotal 검사 결과'
            echo ''
            IFS=',' read -ra items <<< "${{ steps.vt.outputs.analysis }}"
            for i in "${items[@]}"; do
              name="${i%%=*}"; url="${i#*=}"
              echo "- \`${name##*/}\`: [분석 보기](${url})"
            done
            echo ''
            echo '> Windows Defender 등에서 경고가 뜰 수 있으나, 이는 Python 컴파일 실행파일에서 흔한 머신러닝 휴리스틱 오탐입니다. 위 링크에서 전체 엔진 검사 결과를 확인할 수 있습니다.'
            echo 'VTEOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: ${{ steps.vtmd.outputs.body }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
