name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: CVDv2-${{ github.ref_name }}-windows.exe
          - os: macos-latest
            artifact: CVDv2-${{ github.ref_name }}-macos-arm64
          - os: ubuntu-22.04
            artifact: CVDv2-${{ github.ref_name }}-linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Verify version matches tag
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PY_VERSION=$(uv run python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG_VERSION pyproject=$PY_VERSION"
          if [ "$TAG_VERSION" != "$PY_VERSION" ]; then
            echo "::error::태그 버전($TAG_VERSION)과 pyproject.toml 버전($PY_VERSION)이 다릅니다."
            exit 1
          fi

      # patchelf: Nuitka onefile 필수 / 나머지: 기동 스모크(xvfb)에서 Qt 런타임에 필요
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            patchelf xvfb libegl1 libgl1 libxkbcommon-x11-0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-cursor0 libdbus-1-3 imagemagick

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION_NUM="${GITHUB_REF_NAME#v}"
          VERSION_NUM="${VERSION_NUM%%-*}"
          uv run python -m nuitka \
            --onefile \
            --assume-yes-for-downloads \
            --enable-plugin=pyside6 \
            --windows-console-mode=disable \
            --windows-icon-from-ico=resources/chzzk.ico \
            --company-name=honey720 \
            --product-name="Chzzk VOD Downloader" \
            --file-description="Chzzk VOD Downloader v2" \
            --file-version="$VERSION_NUM" \
            --product-version="$VERSION_NUM" \
            --copyright="honey720" \
            --include-data-dir=resources=resources \
            --include-data-dir=translations=translations \
            --output-filename="${{ matrix.artifact }}" \
            --output-dir=build \
            main.py

      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: brew install ccache

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: >
          uv run python -m nuitka
          --standalone
          --assume-yes-for-downloads
          --enable-plugin=pyside6
          --macos-create-app-bundle
          --macos-app-name=CVDv2
          --include-data-dir=resources=resources
          --include-data-dir=translations=translations
          --output-dir=build
          main.py

      - name: Package app bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build
          ls -la
          mv main.app CVDv2.app
          zip -qr "${{ matrix.artifact }}.zip" CVDv2.app

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: >
          uv run python -m nuitka
          --onefile
          --assume-yes-for-downloads
          --enable-plugin=pyside6
          --include-data-dir=resources=resources
          --include-data-dir=translations=translations
          --output-filename=${{ matrix.artifact }}
          --output-dir=build
          main.py

      # ── 기동 스모크: 산출물을 실제로 실행해 30초 생존 확인 ──
      - name: Boot smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          $p = Start-Process -FilePath "build\${{ matrix.artifact }}" -PassThru
          Start-Sleep -Seconds 30
          if ($p.HasExited) {
            Write-Host "::error::기동 스모크 실패 — 프로세스가 조기 종료됨 (exit $($p.ExitCode))"
            exit 1
          }
          try {
            Add-Type -AssemblyName System.Windows.Forms,System.Drawing
            $b = New-Object Drawing.Bitmap 1280,800
            $g = [Drawing.Graphics]::FromImage($b)
            $g.CopyFromScreen(0,0,0,0,$b.Size)
            $b.Save("win-smoke.png")
          } catch { Write-Host "스크린샷 생략: $_" }
          Stop-Process -Id $p.Id -Force
          Write-Host "기동 스모크 통과 (30초 생존)"

      - name: Boot smoke (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x "build/${{ matrix.artifact }}"
          Xvfb :99 -screen 0 1280x800x24 &
          export DISPLAY=:99
          sleep 3
          "build/${{ matrix.artifact }}" &
          PID=$!
          sleep 30
          if ! kill -0 $PID 2>/dev/null; then
            echo "::error::기동 스모크 실패 — 프로세스가 조기 종료됨"
            exit 1
          fi
          import -window root linux-smoke.png || true
          kill $PID || true
          echo "기동 스모크 통과 (30초 생존)"

      - name: Boot smoke + screenshot (macOS)
        if: runner.os == 'macOS'
        run: |
          BIN=$(find build/CVDv2.app/Contents/MacOS -type f -perm +111 | head -1)
          echo "실행 대상: $BIN"
          "$BIN" &
          PID=$!
          sleep 30
          if ! kill -0 $PID 2>/dev/null; then
            echo "::error::기동 스모크 실패 — 프로세스가 조기 종료됨"
            exit 1
          fi
          # 스크린샷은 best-effort (러너 세션 상태에 따라 검은 화면일 수 있음)
          screencapture -x mac-smoke.png || true
          kill $PID || true
          echo "기동 스모크 통과 (30초 생존)"

      - name: Upload smoke screenshot
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshot-${{ matrix.os }}
          path: |
            mac-smoke.png
            linux-smoke.png
            win-smoke.png
          if-no-files-found: ignore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            build/${{ matrix.artifact }}
            build/${{ matrix.artifact }}.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # 스크린샷은 릴리즈 자산이 아니므로 제외
      - name: Exclude non-release files
        rm -f dist/*.png

      # 릴리즈 생성 전에 스캔 → 링크를 본문에 직접 주입 (태그 이벤트에서도 확실히 동작)
      - name: VirusTotal scan
        id: vt
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: dist/*

      - name: Format VT links
        id: vtmd
        run: |
          {
            echo 'body<<VTEOF'
            echo '### 🛡 VirusTotal 검사 결과'
            echo ''
            IFS=',' read -ra items <<< "${{ steps.vt.outputs.analysis }}"
            for i in "${items[@]}"; do
              name="${i%%=*}"; url="${i#*=}"
              echo "- \`${name##*/}\`: [분석 보기](${url})"
            done
            echo ''
            echo '> Windows Defender 등에서 경고가 뜰 수 있으나, 이는 Python 컴파일 실행파일에서 흔한 머신러닝 휴리스틱 오탐입니다. 위 링크에서 전체 엔진 검사 결과를 확인할 수 있습니다.'
            echo 'VTEOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: ${{ steps.vtmd.outputs.body }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
