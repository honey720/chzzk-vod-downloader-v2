[project]
name = "cvdv2"
version = "2.8.0"
description = "Chzzk VOD Downloader v2"
requires-python = ">=3.12"
dependencies = [
    "PySide6",
    "PySide6-Fluent-Widgets",
    "qt-material",
]

[dependency-groups]
dev = [
    "pytest",
    "pytest-qt",
    "ruff",
    "nuitka",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.pytest.ini_options]
testpaths = ["tests"]
